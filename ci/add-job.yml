---
add_job:
  image:
    name: $ELISE_CI_NEXUS_DOCKER_HOSTED/elise/lazarus:$CI_COMMIT_REF_SLUG
  stage: deploy
  needs:
    - job: build_python
      optional: false
  script:
    - |
      ssh $(echo 'cXVlZW4=' | base64 -d)@192.168.40.4 \
          -i /automation/iac-configure.key \
          -o StrictHostKeyChecking=no \
          "echo \"${ELISE_PIPELINE_JOB_TYPE},${ELISE_PIPELINE_JOB_MODE},${ELISE_PIPELINE_JOB_TRIGGER_DATE},${ELISE_PIPELINE_JOB_TRIGGER_TIME}\" >> /tmp/ingest.csv"
